name: Validate Skills

permissions:
  contents: read
  
on:
  push:
    branches: [main]
    paths:
      - 'brave-search/**'
      - '.claude-plugin/**'
      - '.github/workflows/validate.yml'
      - 'AGENTS.md'
  pull_request:
    branches: [main]
    paths:
      - 'brave-search/**'
      - '.claude-plugin/**'
      - '.github/workflows/validate.yml'
      - 'AGENTS.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md format
        run: |
          set -e

          skill_file="brave-search/SKILL.md"

          if [ ! -f "$skill_file" ]; then
            echo "ERROR: Missing $skill_file"
            exit 1
          fi

          # Check for YAML frontmatter
          if ! head -1 "$skill_file" | grep -q "^---$"; then
            echo "ERROR: $skill_file missing YAML frontmatter"
            exit 1
          fi

          # Check for required fields
          if ! grep -q "^name:" "$skill_file"; then
            echo "ERROR: $skill_file missing 'name' field"
            exit 1
          fi

          if ! grep -q "^description:" "$skill_file"; then
            echo "ERROR: $skill_file missing 'description' field"
            exit 1
          fi

          # Check frontmatter is closed
          if [ $(grep -c "^---$" "$skill_file") -lt 2 ]; then
            echo "ERROR: $skill_file has unclosed frontmatter"
            exit 1
          fi

          # Check that name matches directory name
          file_name=$(grep "^name:" "$skill_file" | head -1 | sed 's/^name:[[:space:]]*//')
          if [ "$file_name" != "brave-search" ]; then
            echo "ERROR: $skill_file name '$file_name' does not match directory name 'brave-search'"
            exit 1
          fi

          echo "OK: brave-search"
          echo ""
          echo "Skill validated successfully!"

      - name: Validate reference files exist
        run: |
          set -e

          expected_refs=(
            "brave-search/references/api-key-setup.md"
            "brave-search/references/web-search.md"
            "brave-search/references/llm-context.md"
            "brave-search/references/answers.md"
            "brave-search/references/images-search.md"
            "brave-search/references/news-search.md"
            "brave-search/references/videos-search.md"
            "brave-search/references/local-pois.md"
            "brave-search/references/local-descriptions.md"
            "brave-search/references/suggest.md"
            "brave-search/references/spellcheck.md"
          )

          for ref in "${expected_refs[@]}"; do
            if [ ! -f "$ref" ]; then
              echo "ERROR: Missing reference file: $ref"
              exit 1
            fi
            echo "OK: $ref"
          done

          echo ""
          echo "All reference files present!"

      - name: Check marketplace.json consistency
        run: |
          set -e

          if [ ! -f .claude-plugin/marketplace.json ]; then
            echo "ERROR: Missing .claude-plugin/marketplace.json"
            exit 1
          fi

          # Validate JSON syntax
          if ! jq . .claude-plugin/marketplace.json > /dev/null 2>&1; then
            echo "ERROR: .claude-plugin/marketplace.json is not valid JSON"
            exit 1
          fi

          # Check required fields
          if [ "$(jq -r '.owner.name' .claude-plugin/marketplace.json)" = "null" ]; then
            echo "ERROR: .claude-plugin/marketplace.json missing owner.name"
            exit 1
          fi

          if [ "$(jq -r '.plugins | length' .claude-plugin/marketplace.json)" -lt 1 ]; then
            echo "ERROR: .claude-plugin/marketplace.json has no plugins"
            exit 1
          fi

          # Validate source fields start with ./
          if jq -r '.plugins[].source' .claude-plugin/marketplace.json | grep -qv '^\./'; then
            echo "ERROR: all plugin source fields must start with ./"
            exit 1
          fi

          # Verify brave-search skill is listed
          if ! jq -r '.plugins[].skills[]' .claude-plugin/marketplace.json | grep -qxF "./brave-search"; then
            echo "ERROR: marketplace.json missing skill: ./brave-search"
            exit 1
          fi

          echo ".claude-plugin/marketplace.json is valid"

      - name: Verify AGENTS.md lists skill
        run: |
          set -e
          if ! grep -q 'name="brave-search"' AGENTS.md; then
            echo "ERROR: AGENTS.md missing skill: brave-search"
            exit 1
          fi
          echo "Skill listed in AGENTS.md"
